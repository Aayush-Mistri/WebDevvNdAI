    </body>
    <script>
        let count = 0;
        document.getElementById("plus").addEventListener("click" , function add() {
            count = count + 1;
            document.getElementById("here").value = count
        })
        document.getElementById("minus").addEventListener("click" , function add() {
            count = count - 1;
            document.getElementById("here").value = count
        })

        })
