<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pastebin</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .form-box {
      background-color: white;
      padding: 25px;
      width: 350px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }

    textarea {
      height: 120px;
      resize: vertical;
    }

    button {
      background-color: #222;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="form-box">
    <h2>Create Paste</h2>

    <form action="/pastes" method="POST">
      <input type="text" name="name" placeholder="Enter your name" />       <!-- ✅ name attribute -->
      <input type="email" name="email" placeholder="Enter your email" />    <!-- ✅ name attribute -->
      <textarea name="content" placeholder="Paste your content here..."></textarea> <!-- ✅ new field -->
      <button type="submit">Submit</button>
    </form>
  </div>

</body>
</html>
